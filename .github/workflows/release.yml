name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Generate Changelog
        run: npm run changelog

      - name: Package dist
        run: zip -r dist-${GITHUB_REF_NAME}.zip dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-*.zip
          body_path: CHANGELOG.md
