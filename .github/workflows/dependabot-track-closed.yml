name: Dependabot Track Closed PRs

on:
  pull_request:
    types: [closed]

permissions:
  issues: write
  contents: read

jobs:
  track-closed-dependabot-pr:
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    steps:
      - name: Create tracking issue for blocked dependency upgrade
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const depName = pr.title.match(/bump\s+(\S+)/i)?.[1] || 'dependency';
            const fromVer = pr.title.match(/from\s+(\S+)/i)?.[1] || '?';
            const toVer = pr.title.match(/to\s+(\S+)/i)?.[1] || '?';

            const reason = pr.state_reason || 'closed';
            let reasonText = '';
            if (reason === 'not_planned') {
              reasonText = 'Closed as not planned';
            } else {
              reasonText = 'Closed without merge';
            }

            const title = `deps: Track ${depName} upgrade (${fromVer} → ${toVer})`;

            const body = `## Blocked Dependency Upgrade

**PR:** #${pr.number} — ${pr.title}
**Status:** ${reasonText}
**Branch:** \`${pr.head.ref}\`

### Details
- **Dependency:** ${depName}
- **From:** ${fromVer}
- **To:** ${toVer}

### Next Steps
- [ ] Evaluate if this upgrade is needed
- [ ] Check for peer dependency blockers
- [ ] Create manual upgrade branch if automated PR insufficient
- [ ] Run full test suite before merging

---
*This issue was auto-created when Dependabot PR #${pr.number} was closed unmerged.*
`;

            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              labels: 'dependencies',
              per_page: 50,
            });

            const dup = existingIssues.data.find(i =>
              i.title.toLowerCase().includes(depName.toLowerCase()) &&
              (i.title.includes(toVer) || i.title.includes(toVer.split('.')[0]))
            );

            if (dup) {
              core.info(`Tracking issue already exists: #${dup.number} — skipping auto-creation`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['dependencies', 'technical-debt'],
            });
